apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: test-different-namespace
  name: test-different-namespace
  namespace: different-namespace
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: test-different-namespace
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: test-different-namespace
    spec:
      containers:
      - command:
        - tail
        - -f
        - /dev/null
        image: ubi9-minimal
        imagePullPolicy: Always
        name: ubi9-minimal
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
